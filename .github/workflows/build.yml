name: Build wo1wan.nro

# 推送到 GitHub 后自动构建 wo1wan.nro（Switch 自制程序）
# 构建产物在 Actions → Artifacts 里下载。
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # devkitpro/devkita64 容器预装了完整的 Switch 工具链：
    #   devkitA64 (gcc) / libnx / switch-tools (elf2nro, nacptool)
    # 不需要额外安装任何东西，直接 make 即可出包。
    container: devkitpro/devkita64
    steps:
      - uses: actions/checkout@v4

      - name: Build wo1wan.nro
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wo1wan-nro
          path: out/wo1wan.nro
