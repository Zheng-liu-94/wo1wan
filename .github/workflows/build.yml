name: Build wo1wan

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow the workflow to push the debug log to a branch and publish releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:20251117

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3

      - name: Safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build wo1wan.nro (homebrew payload)
        run: |
          set +e
          bash build.sh > build_log.txt 2>&1
          echo "NRO_EXIT=$?" >> build_log.txt
          tail -8 build_log.txt

      # NOTE: The hand-built forwarder .nsp (make_nsp.py) is a raw ExeFS PFS0
      # WITHOUT NCA/CNMT, so title installers reject it ("content metadata not
      # found"). A legit installable forwarder NSP requires hacbrewpack + the
      # user's own prod.keys, which cannot live in public CI. We therefore no
      # longer build/publish the .nsp. Users launch wo1wan.nro via title override
      # (hold R + launch a game) instead. See README "在 Switch 上使用".

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Publish build log to ci-log branch (for hands-off debugging)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('build_log.txt', 'utf8');
            const data = Buffer.from(content).toString('base64');
            let sha;
            try {
              const r = await github.rest.repos.getContent({
                owner: 'Zheng-liu-94', repo: 'wo1wan', path: 'build_log.txt', ref: 'ci-log'
              });
              sha = r.data.sha;
            } catch (e) { /* file does not exist yet on ci-log */ }
            await github.rest.repos.createOrUpdateFileContents({
              owner: 'Zheng-liu-94', repo: 'wo1wan',
              path: 'build_log.txt', branch: 'ci-log',
              message: 'ci-debug: ' + new Date().toISOString(),
              content: data, sha: sha
            });

      - name: Publish .nro to GitHub Release (public download)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = 'latest';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Create or move tag to current commit
            try {
              await github.rest.git.createRef({ owner, repo, ref: 'refs/tags/' + tag, sha: context.sha });
            } catch (e) {
              await github.rest.git.updateRef({ owner, repo, ref: 'tags/' + tag, sha: context.sha, force: true });
            }

            // Get or create release
            let releaseId;
            const body = 'Latest CI build.\n\n- wo1wan.nro : homebrew payload. Put on SD -> switch/wo1wan.nro, then launch via TITLE OVERRIDE (hold R + launch a game to open hbmenu), NOT the Album. See README.\n\nNo .nsp is provided: a legit installable forwarder NSP needs hacbrewpack + your own prod.keys (copyrighted), which public CI cannot supply.';
            try {
              const r = await github.rest.repos.getReleaseByTag({ owner, repo, tag: tag });
              releaseId = r.data.id;
              await github.rest.repos.updateRelease({ owner, repo, release_id: releaseId, body });
            } catch (e) {
              const r = await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: 'wo1wan latest',
                body, prerelease: true
              });
              releaseId = r.data.id;
            }

            const assets = [
              { name: 'wo1wan.nro', path: 'out/wo1wan.nro' },
            ];
            // Names to remove if present (stale / broken uploads)
            const removeNames = ['wo1wan.nro', 'wo1wan.nsp'];

            // Delete stale assets (including the broken wo1wan.nsp)
            const r = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });
            for (const old of r.data.assets) {
              if (removeNames.includes(old.name)) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: old.id });
              }
            }

            // Upload fresh assets
            for (const a of assets) {
              const data = fs.readFileSync(a.path);
              await github.rest.repos.uploadReleaseAsset({
                owner, repo, release_id: releaseId, name: a.name, data: data,
                headers: { 'content-type': 'application/octet-stream', 'content-length': data.length }
              });
            }
            console.log('Released wo1wan.nro (no .nsp)');
