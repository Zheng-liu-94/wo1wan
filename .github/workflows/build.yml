name: Build wo1wan.nro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow the workflow to push the debug log to a branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build wo1wan.nro (with full log capture)
        run: |
          set +e
          bash build.sh > build_log.txt 2>&1
          echo "EXIT_CODE=$?" >> build_log.txt
          cat build_log.txt
          exit $(tail -1 build_log.txt | cut -d= -f2)

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Publish build log to ci-log branch (for hands-off debugging)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "ci@wo1wan.local"
          git config --global user.name "wo1wan-ci"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/Zheng-liu-94/wo1wan.git"
          # Save the freshly built log BEFORE switching branches (checkout would clobber it)
          cp build_log.txt /tmp/wo1wan_build_log.txt 2>/dev/null || echo "no log file"
          git checkout -B ci-log
          cp /tmp/wo1wan_build_log.txt build_log.txt
          git add -f build_log.txt
          git commit -m "ci-debug: $(date -u +%Y%m%dT%H%M%SZ)" || echo "nothing to commit"
          git push -f origin ci-log

      - name: Upload wo1wan.nro
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wo1wan-nro
          path: out/wo1wan.nro
