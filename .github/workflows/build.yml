name: Build wo1wan.nro

# 推送到 GitHub 后，本工作流会自动用 devkitPro 的 Switch 工具链编译出 wo1wan.nro，
# 在 Actions 页面的 Artifacts 里即可下载。无需本地安装任何工具链。
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 安装 devkitPro 官方 apt 仓库与工具链（来自官方安装脚本，确定性、无交互）
      - name: Install devkitPro toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https wget ca-certificates
          sudo mkdir -p /usr/share/keyring
          sudo wget -U "dkp apt" -O /usr/share/keyring/devkitpro-pub.gpg https://apt.devkitpro.org/devkitpro-pub.gpg
          echo "deb [signed-by=/usr/share/keyring/devkitpro-pub.gpg] https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          echo "/opt/devkitpro/pacman/bin" >> "$GITHUB_PATH"

      # 安装 Switch 组件（devkitA64 + libnx + switch-tools，提供 gcc / elf2nro / nacptool）
      - name: Install Switch dev packages
        run: dkp-pacman -Syu --noconfirm switch-dev

      - name: Build
        run: make

      - name: Upload wo1wan.nro
        uses: actions/upload-artifact@v4
        with:
          name: wo1wan-nro
          path: out/wo1wan.nro
