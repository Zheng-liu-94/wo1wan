name: Build wo1wan

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow the workflow to push the debug log to a branch and publish releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:20251117

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3

      - name: Safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build wo1wan.nro (homebrew payload)
        run: |
          set +e
          bash build.sh > build_log.txt 2>&1
          echo "NRO_EXIT=$?" >> build_log.txt
          tail -8 build_log.txt

      - name: Build wo1wan.nsp (Application forwarder)
        run: |
          set +e
          bash forwarder/build_forwarder.sh >> build_log.txt 2>&1
          echo "NSP_EXIT=$?" >> build_log.txt
          tail -8 build_log.txt

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Publish build log to ci-log branch (for hands-off debugging)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('build_log.txt', 'utf8');
            const data = Buffer.from(content).toString('base64');
            let sha;
            try {
              const r = await github.rest.repos.getContent({
                owner: 'Zheng-liu-94', repo: 'wo1wan', path: 'build_log.txt', ref: 'ci-log'
              });
              sha = r.data.sha;
            } catch (e) { /* file does not exist yet on ci-log */ }
            await github.rest.repos.createOrUpdateFileContents({
              owner: 'Zheng-liu-94', repo: 'wo1wan',
              path: 'build_log.txt', branch: 'ci-log',
              message: 'ci-debug: ' + new Date().toISOString(),
              content: data, sha: sha
            });

      - name: Publish .nro and .nsp to GitHub Release (public download)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = 'latest';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Create or move tag to current commit
            try {
              await github.rest.git.createRef({ owner, repo, ref: 'refs/tags/' + tag, sha: context.sha });
            } catch (e) {
              await github.rest.git.updateRef({ owner, repo, ref: 'tags/' + tag, sha: context.sha, force: true });
            }

            // Get or create release
            let releaseId;
            try {
              const r = await github.rest.repos.getReleaseByTag({ owner, repo, tag: tag });
              releaseId = r.data.id;
            } catch (e) {
              const r = await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: 'wo1wan latest',
                body: 'Latest CI build.\n\n- wo1wan.nro : homebrew payload (put on SD -> switch/wo1wan.nro)\n- wo1wan.nsp : Application forwarder (install to home menu; launches the .nro as SystemApplication so the Web Applet works)',
                prerelease: true
              });
              releaseId = r.data.id;
            }

            const assets = [
              { name: 'wo1wan.nro', path: 'out/wo1wan.nro' },
              { name: 'wo1wan.nsp', path: 'forwarder/wo1wan.nsp' },
            ];

            // Delete stale assets
            const r = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });
            for (const a of assets) {
              const old = r.data.assets.find(x => x.name === a.name);
              if (old) await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: old.id });
            }

            // Upload fresh assets
            for (const a of assets) {
              const data = fs.readFileSync(a.path);
              await github.rest.repos.uploadReleaseAsset({
                owner, repo, release_id: releaseId, name: a.name, data: data,
                headers: { 'content-type': 'application/octet-stream', 'content-length': data.length }
              });
            }
            console.log('Released wo1wan.nro and wo1wan.nsp');
