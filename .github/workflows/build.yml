name: Build wo1wan.nro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Safe directory (container requirement)
        run: |
          git config --global --add safe.directory /__w/wo1wan/wo1wan

      - name: Build wo1wan.nro
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wo1wan-nro
          path: out/wo1wan.nro
