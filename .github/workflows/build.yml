name: Build wo1wan.nro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow the workflow to push the debug log to a branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build wo1wan.nro (with full log capture)
        run: |
          set +e
          bash build.sh > build_log.txt 2>&1
          echo "EXIT_CODE=$?" >> build_log.txt
          cat build_log.txt
          exit $(tail -1 build_log.txt | cut -d= -f2)

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Publish build log to ci-log branch (for hands-off debugging)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('build_log.txt', 'utf8');
            const data = Buffer.from(content).toString('base64');
            let sha;
            try {
              const r = await github.rest.repos.getContent({
                owner: 'Zheng-liu-94', repo: 'wo1wan', path: 'build_log.txt', ref: 'ci-log'
              });
              sha = r.data.sha;
            } catch (e) { /* file does not exist yet on ci-log */ }
            await github.rest.repos.createOrUpdateFileContents({
              owner: 'Zheng-liu-94', repo: 'wo1wan',
              path: 'build_log.txt', branch: 'ci-log',
              message: 'ci-debug: ' + new Date().toISOString(),
              content: data, sha: sha
            });

      - name: Upload wo1wan.nro
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wo1wan-nro
          path: out/wo1wan.nro
