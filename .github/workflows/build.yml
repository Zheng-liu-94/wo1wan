name: Build wo1wan.nro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow the workflow to push the debug log to a branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build wo1wan.nro (with full log capture)
        run: |
          set +e
          bash build.sh > build_log.txt 2>&1
          echo "EXIT_CODE=$?" >> build_log.txt
          cat build_log.txt
          exit $(tail -1 build_log.txt | cut -d= -f2)

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Publish build log to ci-log branch (for hands-off debugging)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('build_log.txt', 'utf8');
            const data = Buffer.from(content).toString('base64');
            let sha;
            try {
              const r = await github.rest.repos.getContent({
                owner: 'Zheng-liu-94', repo: 'wo1wan', path: 'build_log.txt', ref: 'ci-log'
              });
              sha = r.data.sha;
            } catch (e) { /* file does not exist yet on ci-log */ }
            await github.rest.repos.createOrUpdateFileContents({
              owner: 'Zheng-liu-94', repo: 'wo1wan',
              path: 'build_log.txt', branch: 'ci-log',
              message: 'ci-debug: ' + new Date().toISOString(),
              content: data, sha: sha
            });

      - name: Upload wo1wan.nro
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wo1wan-nro
          path: out/wo1wan.nro

      - name: Publish .nro to GitHub Release (public download)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = 'latest';
            const releaseName = 'wo1wan latest';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Create or move tag to current commit
            try {
              await github.rest.git.createRef({ owner, repo, ref: 'refs/tags/' + tag, sha: context.sha });
            } catch (e) {
              await github.rest.git.updateRef({ owner, repo, ref: 'tags/' + tag, sha: context.sha, force: true });
            }

            // Get or create release
            let releaseId;
            try {
              const r = await github.rest.repos.getReleaseByTag({ owner, repo, tag: tag });
              releaseId = r.data.id;
            } catch (e) {
              const r = await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: releaseName,
                body: 'Latest CI build of wo1wan.nro', prerelease: true
              });
              releaseId = r.data.id;
            }

            // Delete old asset
            const assetName = 'wo1wan.nro';
            try {
              const r = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });
              const old = r.data.assets.find(a => a.name === assetName);
              if (old) await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: old.id });
            } catch (e) {}

            // Upload new asset
            const data = fs.readFileSync('out/wo1wan.nro');
            await github.rest.repos.uploadReleaseAsset({
              owner, repo, release_id: releaseId, name: assetName, data: data,
              headers: { 'content-type': 'application/octet-stream', 'content-length': data.length }
            });
